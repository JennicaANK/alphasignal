version: "3.9"

services:
  api:
    build: .
    container_name: alphasignal-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./chroma_db:/app/chroma_db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    container_name: alphasignal-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./chroma_db:/app/chroma_db
    depends_on:
      - api
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0